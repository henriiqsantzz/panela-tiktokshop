<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Frete Expresso • Rota até sua porta</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mapbox/polyline@1.1.0/src/polyline.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', Roboto, sans-serif; background: #000; color: white; height: 100vh; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .controls {
            position: absolute; top: 20px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(12px);
            border-radius: 60px; padding: 8px 16px; display: flex; gap: 12px;
            z-index: 10; border: 1px solid rgba(255,255,255,0.2);
        }
        .controls input {
            flex: 1; background: #1c1e24; border: none; padding: 14px 18px;
            border-radius: 40px; color: white; font-size: 1rem; outline: none;
        }
        .controls button {
            background: #fe2c55; border: none; color: white; font-weight: bold;
            padding: 12px 24px; border-radius: 40px; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }
        .upsell-card {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            border-radius: 28px; padding: 20px; z-index: 20;
            border: 1px solid rgba(255,255,255,0.2);
            transform: translateY(120%); transition: transform 0.35s ease;
        }
        .upsell-card.show { transform: translateY(0); }
        .badge { background: #fe2c55; color: white; font-size: 0.7rem; font-weight: bold; display: inline-block; padding: 4px 12px; border-radius: 60px; margin-bottom: 12px; }
        .title { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .address { font-size: 0.85rem; color: #ccc; margin-bottom: 16px; word-break: break-word; }
        .price { font-size: 1.8rem; font-weight: 800; color: #00b894; margin: 12px 0; }
        .btn-pix { background: #16a34a; width: 100%; padding: 16px; border: none; border-radius: 60px; font-weight: 800; font-size: 1rem; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin-top: 12px; }
        .close { position: absolute; top: 16px; right: 20px; background: rgba(255,255,255,0.2); width: 32px; height: 32px; border-radius: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .loading { font-size: 0.8rem; text-align: center; margin-top: 12px; color: #fe2c55; }
    </style>
</head>
<body>
<div id="map"></div>
<div class="controls">
    <input type="text" id="cepInput" placeholder="Digite seu CEP" value="18605245" maxlength="9">
    <button id="trackBtn"><i class="fas fa-route"></i> Rastrear</button>
</div>
<div id="upsellCard" class="upsell-card">
    <div class="close" id="closeUpsell">✕</div>
    <div class="badge"><i class="fas fa-bolt"></i> OFERTA EXPRESSA</div>
    <div class="title"><i class="fas fa-truck-fast"></i> Entrega Amanhã?</div>
    <div class="address" id="addressText">Buscando endereço...</div>
    <div class="price" id="priceText"></div>
    <button class="btn-pix" id="payBtn"><i class="fab fa-pix"></i> PAGAR COM PIX</button>
</div>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script>
    // --- CONFIGURAÇÕES ---
    mapboxgl.accessToken = 'SEU_TOKEN_MAPBOX_AQUI'; // Substitua pelo seu token público
    const API_URL = '/api/calculate-route'; // Mesma origem, rota serverless

    let map;
    let currentRouteSource = null;
    let animationId = null;
    let currentToken = null;
    let currentFee = null;

    // Inicializa mapa
    map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-streets-v12',
        center: [-46.6361, -23.5475],
        zoom: 10
    });

    // Função para desenhar rota animada (Ant Path)
    function drawAnimatedRoute(polylineStr, startLngLat, endLngLat) {
        if (currentRouteSource) {
            if (map.getLayer('route-layer')) map.removeLayer('route-layer');
            if (map.getSource('route')) map.removeSource('route');
            if (animationId) cancelAnimationFrame(animationId);
        }
        const decoded = Polyline.decode(polylineStr, 6);
        const coordinates = decoded.map(p => [p[1], p[0]]);
        map.addSource('route', {
            type: 'geojson',
            data: {
                type: 'Feature',
                geometry: { type: 'LineString', coordinates }
            }
        });
        map.addLayer({
            id: 'route-layer',
            type: 'line',
            source: 'route',
            paint: {
                'line-color': '#fe2c55',
                'line-width': 4,
                'line-dasharray': [2, 3],
                'line-opacity': 0.9
            }
        });
        // Animação do dash
        let offset = 0;
        function animateDash() {
            offset = (offset + 1) % 12;
            map.setPaintProperty('route-layer', 'line-dasharray', [2, 3]);
            map.setPaintProperty('route-layer', 'line-offset', offset);
            animationId = requestAnimationFrame(animateDash);
        }
        animateDash();
        // Vôo de câmera até o destino (zoom alto)
        map.flyTo({
            center: endLngLat,
            zoom: 16,
            duration: 2500,
            essential: true
        });
        // Marcador de destino
        new mapboxgl.Marker({ color: '#00b894' })
            .setLngLat(endLngLat)
            .setPopup(new mapboxgl.Popup().setHTML('📦 Seu endereço'))
            .addTo(map);
    }

    async function trackCEP() {
        const cep = document.getElementById('cepInput').value.trim();
        if (!cep) return;
        const upsellDiv = document.getElementById('upsellCard');
        upsellDiv.classList.remove('show');
        document.getElementById('addressText').innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Calculando rota real...';
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cep, orderId: `TT_${Date.now()}` })
            });
            const data = await response.json();
            if (data.status !== 'success') throw new Error(data.error || 'Falha na rota');
            const log = data.logistics;
            currentToken = log.pricing.token;
            currentFee = log.pricing.priority_fee;
            const destCoord = [log.destination.coords.lng, log.destination.coords.lat];
            drawAnimatedRoute(log.routing.geometry_polyline, [log.origin.lng, log.origin.lat], destCoord);
            document.getElementById('addressText').innerHTML = `📍 ${log.destination.fullAddress}`;
            document.getElementById('priceText').innerHTML = `+ R$ ${currentFee.toFixed(2)}`;
            upsellDiv.classList.add('show');
        } catch (err) {
            console.error(err);
            document.getElementById('addressText').innerHTML = '❌ Não foi possível calcular a rota. Tente novamente.';
            setTimeout(() => upsellDiv.classList.remove('show'), 2500);
        }
    }

    function redirectToPix() {
        if (!currentToken) return;
        // URL do seu checkout Pix (substitua pela sua)
        const url = `https://seudominio.com/checkout/pix?token=${currentToken}&amount=${currentFee}&origin=frete_upsell`;
        window.location.href = url;
        // Exemplo de alerta para testes: alert(`Redirecionar para Pix com token: ${currentToken}`);
    }

    document.getElementById('trackBtn').addEventListener('click', trackCEP);
    document.getElementById('closeUpsell').addEventListener('click', () => {
        document.getElementById('upsellCard').classList.remove('show');
    });
    document.getElementById('payBtn').addEventListener('click', redirectToPix);
    document.getElementById('cepInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') trackCEP();
    });
    // Carrega automático ao iniciar
    window.addEventListener('load', () => setTimeout(trackCEP, 500));
</script>
</body>
</html>
